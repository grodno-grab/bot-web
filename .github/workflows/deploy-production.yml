name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Immutable URL from build summary (e.g. https://storage.googleapis.com/<bucket>?generation=12345)'
        required: true

jobs:
  sign:
    name: Sign & publish config.json
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out web-bootloader
        uses: actions/checkout@v6
        with:
          repository: grodno-grab/web-bootloader

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Write signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: printf '%s' "$SIGNING_KEY" > /tmp/signing.key

      - name: Sign
        run: npm run sign -- --url "${{ inputs.url }}" --keys /tmp/signing.key

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCS_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload config.json
        env:
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          gzip -9 -c config.json > config.json.gz
          gcloud storage cp config.json.gz "gs://$GCS_BUCKET/config.json" \
            --cache-control="no-store, no-cache, must-revalidate, max-age=0" \
            --content-type="application/json; charset=utf-8" \
            --content-encoding="gzip"
          echo "## Published" >> $GITHUB_STEP_SUMMARY
          echo "https://storage.googleapis.com/$GCS_BUCKET/config.json" >> $GITHUB_STEP_SUMMARY

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing.key
