name: Sign

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Immutable URL from build summary (e.g. https://storage.googleapis.com/<bucket>?generation=12345)'
        required: true

jobs:
  sign:
    name: Sign config.json
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out web-bootloader
        uses: actions/checkout@v6
        with:
          repository: grodno-grab/web-bootloader

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Write signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: printf '%s' "$SIGNING_KEY" > /tmp/signing.key

      - name: Sign
        run: npm run sign -- --url "${{ inputs.url }}" --keys /tmp/signing.key

      - name: Upload config.json artifact
        uses: actions/upload-artifact@v7
        with:
          name: config.json
          path: config.json

      - name: Clean up signing key
        if: always()
        run: rm -f /tmp/signing.key
