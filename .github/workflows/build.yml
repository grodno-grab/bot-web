name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: bot-web-builder:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/build-cache:latest
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/build-cache:latest,mode=max
        env:
          DOCKER_BUILD_SUMMARY: "false"

      - name: Write .env.local from repository variables
        env:
          VITE_API_ID: ${{ vars.VITE_API_ID }}
          VITE_API_HASH: ${{ vars.VITE_API_HASH }}
          VITE_BOT_CHAT_ID: ${{ vars.VITE_BOT_CHAT_ID }}
          VITE_BOT_USERNAME: ${{ vars.VITE_BOT_USERNAME }}
          VITE_BOT_START_PARAMETER: ${{ vars.VITE_BOT_START_PARAMETER }}
          VITE_BOT_COMMAND_SUCCESS: ${{ vars.VITE_BOT_COMMAND_SUCCESS }}
          VITE_BOT_COMMAND_FAILURE: ${{ vars.VITE_BOT_COMMAND_FAILURE }}
        run: printenv | grep '^VITE_' | grep -v '=$' > .env.local

      - name: Build
        run: |
          mkdir -p dist
          docker run --rm \
            -v "${{ github.workspace }}/.env.local:/app/.env.local:ro" \
            -v "${{ github.workspace }}/dist:/app/dist" \
            bot-web-builder

      - name: SHA-256
        run: sha256sum dist/index.html

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: index.html
          path: dist/index.html
          if-no-files-found: error

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Deploy to GCS
        env:
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GCS_OBJECT: ${{ vars.GCS_OBJECT }}
          GCS_CREDENTIALS: ${{ secrets.GCS_CREDENTIALS }}
          SKIP_BUILD: "1"
        run: |
          npm install
          node scripts/deploy.mjs | tee /tmp/deploy.log
          URL=$(grep -oP 'https://\S+' /tmp/deploy.log | tail -1)
          echo "## Deployed" >> $GITHUB_STEP_SUMMARY
          echo "$URL" >> $GITHUB_STEP_SUMMARY
